name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools openjdk-8-jdk
        sudo apt install -y libffi-dev libssl-dev zlib1g-dev autoconf automake libtool git zip unzip patch
        
    - name: Install Buildozer
      run: |
        pip3 install --upgrade cython
        pip3 install buildozer kivy==2.1.0
        
    - name: Create placeholder files
      run: |
        # 创建基本的main.py文件
        cat > main.py << 'EOL'
from kivy.app import App
from kivy.uix.label import Label
from kivy.uix.boxlayout import BoxLayout
from kivy.uix.button import Button

class MainApp(App):
    def build(self):
        layout = BoxLayout(orientation='vertical', padding=10, spacing=10)
        
        title_label = Label(text='永红林场动植物识别学习系统', size_hint=(1, 0.2))
        content_label = Label(text='欢迎使用动植物识别系统', size_hint=(1, 0.6))
        button = Button(text='开始学习', size_hint=(1, 0.2))
        
        layout.add_widget(title_label)
        layout.add_widget(content_label)
        layout.add_widget(button)
        
        return layout

MainApp().run()
EOL
        
        # 创建占位符图标和启动画面
        echo "Creating placeholder images..."
        python3 -c "
from PIL import Image
# 创建占位符图标
icon = Image.new('RGB', (512, 512), color='red')
icon.save('icon.png')
# 创建占位符启动画面
splash = Image.new('RGB', (512, 512), color='blue')
splash.save('splash.png')
"
        
    - name: Prepare buildozer.spec
      run: |
        # 创建buildozer.spec文件
        cat > buildozer.spec << 'EOL'
[app]

# Application versioning
version = 1.0
package.name = enhancedquiz
package.domain = org.example

# Source code where the main file exists
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,ttf,mp3,wav,ogg,jpeg,gif,bmp

# Application requirements
requirements = python3,kivy==2.1.0,pillow,requests

# Buildozer environment
android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
android.api = 30
android.minapi = 21
android.ndk_api = 21
android.archs = arm64-v8a

# Build settings
android.accept_sdk_license = True
p4a.branch = develop

# Orientation
orientation = portrait

# Title of application
title = 永红林场动植物识别学习系统

# Icon and splash
icon.filename = %(source.dir)s/icon.png
splash.filename = %(source.dir)s/splash.png

[buildozer]

# Log level
log_level = 2

# Build directory
build_dir = .buildozer

# Clean build
clean_build = True

# Verbose logging for debugging
verbose = True
EOL
        
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
        
    - name: Setup Android Environment
      run: |
        # 设置环境变量
        echo "ANDROID_HOME=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=/usr/local/lib/android/sdk" >> $GITHUB_ENV
        echo "ANDROID_NDK_HOME=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV
        echo "ANDROID_NDK_ROOT=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV
        echo "ANDROID_NDK=/usr/local/lib/android/sdk/ndk/27.3.13750724" >> $GITHUB_ENV
        
    - name: Initialize Buildozer
      run: |
        export PATH=$PATH:~/.local/bin
        # 初始化buildozer环境
        buildozer android clean
        # 预先下载依赖
        buildozer android update
        
    - name: Build APK
      timeout-minutes: 60  # 增加超时时间
      run: |
        export PATH=$PATH:~/.local/bin
        # 设置NDK环境变量
        export ANDROID_NDK_HOME="/usr/local/lib/android/sdk/ndk/27.3.13750724"
        export ANDROID_NDK_ROOT="/usr/local/lib/android/sdk/ndk/27.3.13750724"
        # 执行构建
        buildozer android debug
        
    - name: Find APK files
      run: |
        echo "Looking for APK files..."
        find . -name "*.apk" -type f -exec ls -la {} \; || echo "No APK files found"
        echo "Listing bin directory contents:"
        ls -la bin/ 2>/dev/null || echo "bin/ directory does not exist"
        echo "Checking build directories:"
        find .buildozer/android/platform/build*/dists/*/ -name "*.apk" -type f -exec ls -la {} \; || echo "No APK found in build dist directories"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk-file
        path: |
          **/*.apk
          !**/*unsigned.apk
        if-no-files-found: warn
