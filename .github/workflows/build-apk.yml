name: Build Android APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
      ANDROID_SDK_HOME: /home/runner/.buildozer/android/platform/android-sdk
      # 关键修正：移除 ANDROID_NDK_HOME，让 Buildozer 自己下载 NDK
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: 安装Ubuntu底层编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev pkg-config zip unzip wget curl
      - name: 安装Python构建工具
        run: |
          python -m pip install --upgrade pip
          pip install setuptools==65.5.0 wheel
          pip install Cython==0.29.36
          pip install buildozer==1.5.0
      - name: 缓存Buildozer构建文件
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-
      - name: 安装Android SDK命令行工具（关键修正）
        run: |
          # 创建单层目录
          mkdir -p $ANDROID_SDK_HOME/cmdline-tools
          
          # 下载并解压
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip -d $ANDROID_SDK_HOME/cmdline-tools
          
          # 仅给 sdkmanager 添加执行权限（避免通配符错误）
          chmod +x $ANDROID_SDK_HOME/cmdline-tools/cmdline-tools/bin/sdkmanager
          
          # 第一步：自动接受所有许可协议（关键！）
          (echo y; echo y; echo y; echo y; echo y) | $ANDROID_SDK_HOME/cmdline-tools/cmdline-tools/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_HOME || true
          
          # 第二步：安装必要组件（不安装 NDK！让 Buildozer 自己下载）
          $ANDROID_SDK_HOME/cmdline-tools/cmdline-tools/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_SDK_HOME
      - name: Build APK
        run: |
          buildozer android debug --verbose
        timeout-minutes: 180  # 增加超时时间（NDK 下载需要时间）
      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: bin/*.apk
