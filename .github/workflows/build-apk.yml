name: Build Kivy App for Android

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 build-essential libffi-dev python3-dev python3-venv
        sudo apt install -y openjdk-8-jdk
        sudo apt install -y android-tools-adb
        sudo apt install -y gcc-multilib g++-multilib
        sudo apt install -y libc6-dev-i386
        sudo apt install -y lib32z1-dev lib32stdc++6-dev
        sudo apt install -y wget unzip git
        
    - name: Configure pip to use Tsinghua source
      run: |
        pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
        pip config set global.trusted-host pypi.tuna.tsinghua.edu.cn
        
    - name: Install Buildozer and dependencies
      run: |
        python -m pip install --upgrade pip setuptools cython
        pip install buildozer
        pip install python-for-android==2023.12.23
        
    - name: Verify buildozer.spec exists and show its content
      run: |
        if [ ! -f "buildozer.spec" ]; then
          echo "错误: 没有找到 buildozer.spec 文件。请确保你的项目中有此配置文件。"
          ls -la
          exit 1
        else
          echo "=== buildozer.spec 内容 ==="
          cat buildozer.spec
          echo "==========================="
        fi
        
    - name: Clean previous builds
      run: |
        rm -rf .buildozer
        mkdir -p .buildozer/android/platform
        
    - name: Setup Android SDK and NDK
      run: |
        # 设置环境变量
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-r25b
        export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/platform-tools:$ANDROID_NDK_ROOT
        
        # 创建必要目录
        mkdir -p $ANDROID_HOME
        mkdir -p $ANDROID_NDK_ROOT
        
        # 下载并解压NDK
        cd $HOME/.buildozer/android/platform
        if [ ! -d "android-ndk-r25b" ]; then
          echo "正在下载Android NDK r25b..."
          wget -q https://dl.google.com/android/repository/android-ndk-r25b-linux.zip
          unzip -q android-ndk-r25b-linux.zip
          echo "NDK r25b 下载完成"
        else
          echo "NDK r25b 已存在"
        fi
        
        # 验证NDK
        if [ -d "$ANDROID_NDK_ROOT" ]; then
          echo "NDK 路径: $ANDROID_NDK_ROOT"
          ls -la $ANDROID_NDK_ROOT | head -10
        else
          echo "错误: NDK 目录不存在: $ANDROID_NDK_ROOT"
          exit 1
        fi
        
    - name: Create basic project structure if needed
      run: |
        # 检查是否存在main.py，如果不存在则创建一个简单的示例
        if [ ! -f "main.py" ]; then
          echo "创建示例 main.py 文件..."
          # 使用printf代替cat heredoc以避免YAML解析问题
          printf '%s\n' \
            'from kivy.app import App' \
            'from kivy.uix.label import Label' \
            '' \
            'class MyApp(App):' \
            '    def build(self):' \
            "        return Label(text='永红林场动植物识别学习系统')" \
            '' \
            'MyApp().run()' > main.py
        fi
        
        # 检查是否存在图标文件，如果不存在则创建一个基本的
        if [ ! -f "icon.png" ]; then
          echo "创建示例图标文件..."
          # 创建一个简单的1024x1024像素的PNG图标（使用base64编码的透明PNG）
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > icon.png
        fi
        
        # 检查是否存在启动画面文件，如果不存在则创建一个基本的
        if [ ! -f "splash.png" ]; then
          echo "创建示例启动画面文件..."
          # 创建一个简单的PNG文件
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > splash.png
        fi
        
        ls -la
        
    - name: Build Android APK with maximum logging
      run: |
        # 设置环境变量
        export ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk
        export ANDROID_SDK_ROOT=$ANDROID_HOME
        export ANDROID_NDK_ROOT=$HOME/.buildozer/android/platform/android-ndk-r25b
        
        # 验证环境变量
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_NDK_ROOT: $ANDROID_NDK_ROOT"
        
        # 开始构建
        echo "开始构建 APK..."
        timeout 60m buildozer android debug 2>&1 | tee build_full_log.txt || {
          echo "构建失败或超时，显示最后的错误信息..."
          echo "=== 最后100行日志 ==="
          tail -100 build_full_log.txt
          
          echo "=== 搜索关键错误信息 ==="
          grep -i -A 5 -B 5 "error\|failed\|exception\|traceback" build_full_log.txt || echo "未找到明显的错误信息"
          
          echo "=== 搜索编译错误 ==="
          grep -i -A 10 -B 10 "compilation\|linking\|make\|cmake" build_full_log.txt | grep -i -A 5 -B 5 "error\|fail" || echo "未找到编译错误"
          
          # 上传完整日志以便分析
          echo "构建失败，保存完整日志用于调试"
          exit 1
        }
        
    - name: Find APK files
      run: |
        echo "查找生成的 APK 文件..."
        find . -name "*.apk" -type f
        if [ -f "bin/*.apk" ]; then
          ls -la bin/
        else
          echo "在 bin/ 目录中未找到 APK 文件"
          find . -name "*.apk" -exec ls -la {} \;
        fi
        
    - name: Upload build logs
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: build_full_log.txt
      if: always # 无论成功还是失败都上传日志
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
      if: success()
