name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools openjdk-8-jdk
        sudo apt install -y libffi-dev libssl-dev zlib1g-dev autoconf automake libtool
        
    - name: Install Buildozer
      run: |
        pip3 install --upgrade cython
        pip3 install buildozer kivy==2.1.0
        
    - name: Create buildozer.spec
      run: |
        # 创建临时的buildozer.spec文件
        touch temp_spec.txt
        echo "[app]" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Application versioning" >> temp_spec.txt
        echo "version = 1.0" >> temp_spec.txt
        echo "package.name = enhancedquiz" >> temp_spec.txt
        echo "package.domain = org.example" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Source code where the main file exists" >> temp_spec.txt
        echo "source.dir = ." >> temp_spec.txt
        echo "source.include_exts = py,png,jpg,kv,atlas,ttf,mp3,wav,ogg,jpeg,gif,bmp" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Application requirements - 精简依赖列表" >> temp_spec.txt
        echo "requirements = python3,kivy==2.1.0,pillow,requests,pyjnius" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Buildozer environment" >> temp_spec.txt
        echo "android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE" >> temp_spec.txt
        echo "android.api = 30" >> temp_spec.txt
        echo "android.minapi = 21" >> temp_spec.txt
        echo "android.ndk = 23c" >> temp_spec.txt
        echo "android.sdk = 30" >> temp_spec.txt
        echo "android.archs = arm64-v8a,armeabi-v7a" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Build settings" >> temp_spec.txt
        echo "android.accept_sdk_license = True" >> temp_spec.txt
        echo "p4a.branch = develop" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Orientation - 必须是小写" >> temp_spec.txt
        echo "orientation = portrait" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Title of application" >> temp_spec.txt
        echo "title = 永红林场动植物识别学习系统" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Icon and splash" >> temp_spec.txt
        echo "icon.filename = %(source.dir)s/icon.png" >> temp_spec.txt
        echo "splash.filename = %(source.dir)s/splash.png" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "[buildozer]" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Log level" >> temp_spec.txt
        echo "log_level = 2" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Build directory" >> temp_spec.txt
        echo "build_dir = .buildozer" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Clean build" >> temp_spec.txt
        echo "clean_build = True" >> temp_spec.txt
        echo "" >> temp_spec.txt
        echo "# Verbose logging for debugging" >> temp_spec.txt
        echo "verbose = True" >> temp_spec.txt
        mv temp_spec.txt buildozer.spec
        
    - name: Cache Buildozer
      uses: actions/cache@v3
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
        
    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug
        
    - name: List output files
      run: |
        find . -name "*.apk" -type f
        ls -la bin/ 2>/dev/null || echo "bin/ directory does not exist"
        ls -la ./*.apk 2>/dev/null || find . -name "*.apk" -exec ls -la {} \;
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: apk-file
        path: bin/*.apk
        if-no-files-found: warn
