name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install Java 17 & dependencies
      run: |
        sudo apt update
        sudo apt install -y openjdk-17-jdk git wget unzip zip build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install setuptools==65.5.0 wheel setuptools-rust
        pip install Cython==0.29.36
        pip install buildozer==1.5.0

    - name: Build APK
      run: |
        buildozer android debug
      timeout-minutes: 90

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
