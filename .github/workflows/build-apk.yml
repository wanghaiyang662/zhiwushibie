name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest  # 切换到最新 runner，彻底解决排队问题
    # 全局环境变量，使用系统环境变量语法，修复 PATH 识别错误
    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform
      PATH: /home/runner/.buildozer/android/platform/cmdline-tools/latest/bin:/home/runner/.buildozer/android/platform/platform-tools:$PATH
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5  # 升级到 v5，消除 Node.js 弃用警告
      with:
        python-version: '3.10'  # 适配新版 Buildozer 和依赖兼容性
        
    - name: Cache Buildozer
      uses: actions/cache@v4  # 升级到 v4，消除 Node.js 弃用警告
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
        
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential git unzip zip libffi-dev libssl-dev libncurses5-dev autoconf libtool pkg-config openjdk-11-jdk zipalign
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install Cython==0.29.36  # 适配 Kivy 2.1.0 的稳定兼容版本
        pip install buildozer==1.5.0 # 稳定版 Buildozer，避免开发版的兼容性问题
        
    - name: Setup Android SDK
      run: |
        mkdir -p $ANDROID_HOME
        cd $ANDROID_HOME
        # 使用最新版 commandline tools，适配新的 Android 构建环境
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ 2>/dev/null || true
        rm commandlinetools-linux-11076708_latest.zip
        
    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses || true
        
    - name: Install required SDK packages
      run: |
        # 提前安装我们需要的 SDK 包，解决 aidl 找不到的问题
        sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"
        
    - name: Debug - Show buildozer.spec
      run: |
        cat buildozer.spec
        
    - name: Build Android APK
      run: |
        buildozer android debug
      timeout-minutes: 60  # 增加超时时间，适配复杂依赖的完整编译流程
      
    - name: Debug - List output files
      if: always()  # 无论构建成败都执行，方便排查问题
      run: |
        echo "Listing all APK files in project:"
        find . -type f -name "*.apk" -exec ls -la {} \;
        echo "Contents of bin directory:"
        ls -la bin/ || echo "Bin directory does not exist"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
      if: success()  # 仅构建成功时上传产物
