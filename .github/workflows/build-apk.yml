name: Build Android APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk libncurses5 libncurses5-dev libncursesw5 lib32z1 lib32ncurses6 lib32stdc++6 curl wget build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev pkg-config
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.36
          pip install buildozer==1.5.0
      - name: 设置Android SDK（完全兼容Buildozer）
        run: |
          # 创建SDK目录
          SDK_PATH="/home/runner/.buildozer/android/platform/android-sdk"
          mkdir -p $SDK_PATH
          
          # 下载旧版SDK Tools（包含tools目录）
          wget -O sdk-tools.zip https://dl.google.com/android/repository/sdk-tools-linux-4333796.zip
          unzip -q sdk-tools.zip -d $SDK_PATH
          rm sdk-tools.zip
          
          # 创建许可文件（避免交互式提示）
          mkdir -p $SDK_PATH/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $SDK_PATH/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $SDK_PATH/licenses/android-sdk-preview-license
          
          # 设置环境变量
          export ANDROID_HOME=$SDK_PATH
          export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools
          
          # 安装必要组件
          yes | $ANDROID_HOME/tools/bin/sdkmanager --update
          yes | $ANDROID_HOME/tools/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;34.0.0" "ndk;25.1.8937393"
          
          # 验证安装
          $ANDROID_HOME/tools/bin/sdkmanager --list
      - name: 构建APK
        run: |
          # 设置环境变量
          export ANDROID_HOME="/home/runner/.buildozer/android/platform/android-sdk"
          export PATH=$PATH:$ANDROID_HOME/tools:$ANDROID_HOME/tools/bin:$ANDROID_HOME/platform-tools
          
          # 清除可能的缓存
          rm -rf .buildozer/android/platform/python-for-android
          
          # 构建
          buildozer android debug --verbose
        timeout-minutes: 180
      - name: 保存APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: bin/*.apk
