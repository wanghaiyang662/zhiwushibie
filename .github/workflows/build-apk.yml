name: Build Android APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # 强制使用Java 11（Buildozer兼容性最佳）
      JAVA_HOME: /usr/lib/jvm/temurin-11-jdk-amd64
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
    steps:
      - uses: actions/checkout@v4
      - name: 设置Java 11环境
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip libncurses5 libncurses5-dev libncursesw5 lib32z1 lib32ncurses6 lib32stdc++6 curl wget build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev pkg-config libusb-1.0-0
          
          # 固定Gradle版本
          sudo mkdir -p /usr/share/gradle
          sudo wget https://services.gradle.org/distributions/gradle-7.4.2-bin.zip -P /tmp
          sudo unzip -q /tmp/gradle-7.4.2-bin.zip -d /usr/share/gradle
          sudo ln -sfn /usr/share/gradle/gradle-7.4.2 /usr/share/gradle/latest
          echo "/usr/share/gradle/latest/bin" >> $GITHUB_PATH
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir setuptools==65.5.0 wheel==0.42.0
          pip install --no-cache-dir Cython==0.29.36
          pip install --no-cache-dir buildozer==1.5.0
          pip install --no-cache-dir python-for-android==2023.4.15
      - name: 安装Android SDK工具
        run: |
          # 创建SDK目录
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          
          # 下载SDK命令行工具
          wget -O sdk-tools.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q sdk-tools.zip -d /tmp/sdk-extract
          mv /tmp/sdk-extract/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          rm -rf /tmp/sdk-extract sdk-tools.zip
          
          # 设置权限
          chmod +x $ANDROID_HOME/cmdline-tools/latest/bin/*
          
          # 创建许可文件
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license
          
          # 安装SDK组件
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --update
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME "platform-tools" "platforms;android-31" "build-tools;31.0.0" "ndk;25.1.8937393"
          
          # 验证安装
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --sdk_root=$ANDROID_HOME --list_installed
          
          # 添加到PATH
          echo "$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools" >> $GITHUB_PATH
      - name: 清理构建环境
        run: |
          rm -rf ~/.buildozer
          rm -rf .buildozer
          mkdir -p ~/.buildozer/android
      - name: 构建APK（详细日志模式）
        run: |
          # 设置环境变量
          export ANDROID_HOME=$ANDROID_HOME
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          export JAVA_HOME=/usr/lib/jvm/temurin-11-jdk-amd64
          
          # 打印环境信息
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "JAVA_HOME: $JAVA_HOME"
          echo "Gradle version: $(gradle --version)"
          echo "Java version: $(java -version 2>&1)"
          
          # 以详细模式构建
          buildozer --verbose android debug
        timeout-minutes: 240
      - name: 保存构建产物
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: bin/*.apk
      - name: 保存构建日志（用于调试）
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            .buildozer/android/platform/python-for-android/*.log
            .buildozer/android/platform/python-for-android/build/*.log
            ~/.buildozer/android/platform/*/gradle.log
