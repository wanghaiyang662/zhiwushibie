name: Build Android APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
      ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk-r25b
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: 安装Ubuntu底层编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev pkg-config zip unzip wget curl
      - name: 安装Python构建工具
        run: |
          python -m pip install --upgrade pip
          pip install setuptools==65.5.0 wheel
          pip install Cython==0.29.36
          pip install buildozer==1.5.0
      - name: 缓存Buildozer构建文件
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-
      - name: 安装Android SDK命令行工具
        run: |
          # 确保创建SDK目录
          mkdir -p ~/.buildozer/android/platform/android-sdk
          # 下载Android SDK命令行工具
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip commandlinetools-linux-9477386_latest.zip -d ~/.buildozer/android/platform/android-sdk
          # 安装必要的SDK组件
          yes | ~/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;34.0.0" "ndk;25.0.10325124"
      - name: Build APK
        run: |
          buildozer android debug --verbose
        timeout-minutes: 150
      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: bin/*.apk
