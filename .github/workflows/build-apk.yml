name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Configure pip mirror
      run: |
        pip config set global.index-url https://pypi.tuna.tsinghua.edu.cn/simple
        pip config set global.trusted-host pypi.tuna.tsinghua.edu.cn

    - name: Install Rust toolchain (解决cryptography编译依赖)
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: stable
        target: armv7-linux-androideabi
        target: aarch64-linux-android

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          git \
          python3-dev \
          libssl-dev \
          libffi-dev \
          libxml2-dev \
          libxslt1-dev \
          zlib1g-dev \
          openjdk-17-jdk \
          unzip \
          ant
        pip install --upgrade pip setuptools wheel
        # 安装cryptography编译所需依赖
        pip install setuptools-rust cython
        pip install buildozer==1.5.0 python-for-android==2023.07.02

    - name: Set environment variables
      run: |
        echo "ANDROIDSDK=/home/runner/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
        echo "ANDROIDNDK=/home/runner/.buildozer/android/platform/android-ndk-r25b" >> $GITHUB_ENV
        echo "ANDROIDAPI=31" >> $GITHUB_ENV
        echo "ANDROIDMINAPI=21" >> $GITHUB_ENV
        echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

    - name: Build APK with Buildozer
      run: |
        buildozer android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
