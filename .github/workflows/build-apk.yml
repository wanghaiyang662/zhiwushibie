name: Build Android APK
on: 
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
      ANDROID_NDK_HOME: /home/runner/.buildozer/android/platform/android-ndk-r23b
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          
      - name: Cache Android SDK and NDK
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            /home/runner/.buildozer/android/platform/android-sdk
            /home/runner/.buildozer/android/platform/android-ndk-r23b
          key: android-sdk-ndk-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            android-sdk-ndk-${{ runner.os }}-
            
      - name: Install build dependencies
        run: |
          sudo apt update -y
          sudo apt install -y openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev pkg-config zip unzip wget curl python3-pip python3-dev libncurses5-dev libgdbm-dev libnss3-dev libssl-dev libreadline-dev libffi-dev libsqlite3-dev wget libbz2-dev android-tools-adb android-tools-fastboot
          
      - name: Set up Java
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "/usr/lib/jvm/java-17-openjdk-amd64/bin" >> $GITHUB_PATH
          
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install setuptools==65.5.0 wheel Cython==0.29.36 buildozer==1.5.0 python-for-android==2023.7.27
      
      - name: Prepare project structure
        run: |
          # Create required directories
          mkdir -p assets/animal_photos
          touch assets/animal_photos/.gitkeep
          
      - name: Build APK
        run: |
          # Initialize buildozer
          buildozer init || true
          # Ensure buildozer.spec exists
          if [ ! -f buildozer.spec ]; then
            echo "buildozer.spec file missing!"
            exit 1
          fi
          # Build the APK
          buildozer android debug --verbose
        timeout-minutes: 180  # Increased timeout for longer builds
        
      - name: Upload APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: bin/*.apk
          
      - name: Debug - List bin directory
        if: always()
        run: ls -la bin/ || echo "bin directory does not exist"
