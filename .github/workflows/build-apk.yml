name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
      BUILDOZER_LOG_LEVEL: DEBUG

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
        cache: 'pip'

    - name: Clear all broken caches
      run: |
        rm -rf ~/.buildozer
        rm -rf ./.buildozer
        rm -rf ~/.gradle
        rm -rf ~/.cache/pip

    - name: Install system dependencies
      run: |
        sudo apt update -y
        sudo apt --fix-broken install -y
        sudo apt install -y build-essential git unzip zip libffi-dev libssl-dev libncurses5-dev \
        autoconf libtool pkg-config zipalign libltdl-dev \
        libjpeg-dev libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
        libgl1-mesa-dev libgles2-mesa-dev ant

    - name: Install Java 17 (required for new sdkmanager)
      run: |
        sudo apt install -y openjdk-17-jdk
        sudo update-alternatives --set java /usr/lib/jvm/java-17-openjdk-amd64/bin/java
        java -version

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools==65.5.0 wheel setuptools-rust
        pip install Cython==0.29.36
        pip install buildozer==1.5.0
        pip list

    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=/home/runner/.buildozer/android/platform
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        mkdir -p $ANDROID_HOME
        cd $ANDROID_HOME
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* cmdline-tools/latest/ 2>/dev/null || true
        rm -f commandlinetools-linux-11076708_latest.zip
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$PATH" >> $GITHUB_ENV

    - name: Accept SDK licenses
      run: yes | sdkmanager --licenses >/dev/null 2>&1 || true

    - name: Install SDK packages
      run: sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"

    - name: Show buildozer.spec
      run: cat buildozer.spec

    - name: Build Android APK
      run: buildozer android debug --verbose
      timeout-minutes: 90

    - name: List APK files
      if: always()
      run: |
        find . -name "*.apk" -type f
        ls -la bin/ 2>/dev/null || true

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
      if: success()
