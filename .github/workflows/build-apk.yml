name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        sudo apt update -y
        sudo apt install -y openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool zipalign

    - name: Install Python packages
      run: |
        python -m pip install --upgrade pip
        pip install setuptools==65.5.0 wheel
        pip install Cython==0.29.36
        pip install buildozer==1.5.0

    - name: 强制删除 cryptography 编译（终极修复）
      run: |
        mkdir -p p4a/
        cat > p4a/__init__.py << 'EOF'
        from pythonforandroid.recipe import Recipe
        try:
            Recipe.get_recipe('cryptography', None).build_arch = lambda self,arch: None
        except:
            pass
        EOF

    - name: 编译 APK（无 cryptography 报错）
      run: |
        buildozer android debug --verbose --no-clean
      timeout-minutes: 120
      env:
        P4A_skip: cryptography

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
