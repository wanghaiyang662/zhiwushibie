name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools openjdk-8-jdk
        sudo apt install -y libffi-dev libssl-dev zlib1g-dev autoconf automake libtool
        
    - name: Install Buildozer
      run: |
        pip3 install --upgrade cython
        pip3 install buildozer kivy==2.1.0
        
    - name: Initialize Buildozer
      run: |
        buildozer init || true
        
    - name: Update buildozer.spec
      run: |
        cat > buildozer.spec << EOF
[app]

# Application versioning
version = 1.0
package.name = enhancedquiz
package.domain = org.example

# Source code where the main file exists
source.dir = .
source.include_exts = py,png,jpg,kv,atlas,ttf,mp3,wav,ogg,jpeg,gif,bmp

# Application requirements - 精简依赖列表
requirements = python3,kivy==2.1.0,pillow,requests,pyjnius

# Buildozer environment
android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE
android.api = 30
android.minapi = 21
android.ndk = 23c
android.sdk = 30
android.archs = arm64-v8a,armeabi-v7a

# Build settings
android.accept_sdk_license = True
p4a.branch = develop

# Orientation - 必须是小写
orientation = portrait

# Title of application
title = 永红林场动植物识别学习系统

# Icon and splash
icon.filename = %(source.dir)s/icon.png
splash.filename = %(source.dir)s/splash.png

[buildozer]

# Log level
log_level = 2

# Build directory
build_dir = .buildozer

# Clean build
clean_build = True

# Verbose logging for debugging
verbose = True
EOF
        
    - name: Cache Buildozer
      uses: actions/cache@v3
      with:
        path: ~/.buildozer
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}
        
    - name: Build APK
      run: |
        export PATH=$PATH:~/.local/bin
        buildozer android debug
        
    - name: List output files
      run: |
        find . -name "*.apk" -type f
        ls -la bin/ 2>/dev/null || echo "bin/ directory does not exist"
        ls -la ./*.apk 2>/dev/null || find . -name "*.apk" -exec ls -la {} \;
        
    - name: Upload APK
      uses: actions/upload-artifact@v3
      if: success()
      with:
        name: apk-file
        path: bin/*.apk
        if-no-files-found: warn
