name: Build Android APK
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    # 全局配置 pip 国内源，解决国外源 502 下载失败的问题
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'  # Buildozer 1.5.0 官方最兼容的 Python3.9，稳定性拉满
        
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: ~/.buildozer
        # 全新缓存key v5，彻底清空所有旧的坏缓存，重新下载所有依赖
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec') }}-v5
        
    - name: Install system dependencies
      run: |
        sudo apt update
        # 新增了 libltdl-dev！解决了 libffi 编译的 LT_SYS_SYMBOL_USCORE 宏缺失错误！
        sudo apt install -y build-essential git unzip zip libffi-dev libssl-dev libncurses5-dev autoconf libtool pkg-config openjdk-11-jdk zipalign libltdl-dev
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # 先安装兼容的 setuptools 版本，避免新版本的兼容问题
        pip install setuptools==65.5.0
        pip install Cython==0.29.36  # 适配 Kivy 2.1.0 的稳定兼容版本
        pip install buildozer==1.5.0 # 稳定版 Buildozer，避免开发版的兼容性问题
        
    - name: Setup Android SDK
      run: |
        export ANDROID_HOME=/home/runner/.buildozer/android/platform
        export PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH
        mkdir -p $ANDROID_HOME
        cd $ANDROID_HOME
        # 使用最新版 commandline tools，适配新的 Android 构建环境
        wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip
        unzip -q commandlinetools-linux-11076708_latest.zip
        mkdir -p cmdline-tools/latest
        mv cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/ 2>/dev/null || true
        rm commandlinetools-linux-11076708_latest.zip
        
        # 把环境变量保存到全局，后续步骤都能用到
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$PATH" >> $GITHUB_ENV
        
    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses || true
        
    - name: Install required SDK packages
      run: |
        # 提前安装我们需要的 SDK 包，解决 aidl 找不到的问题
        sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0"
        
    - name: Debug - Show buildozer.spec
      run: |
        cat buildozer.spec
        
    - name: Build Android APK
      run: |
        buildozer android debug
      timeout-minutes: 60  # 增加超时时间，适配复杂依赖的完整编译流程
      
    - name: Debug - List output files
      if: always()  # 无论构建成败都执行，方便排查问题
      run: |
        echo "Listing all APK files in project:"
        find . -type f -name "*.apk" -exec ls -la {} \;
        echo "Contents of bin directory:"
        ls -la bin/ || echo "Bin directory does not exist"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
      if: success()  # 仅构建成功时上传产物
