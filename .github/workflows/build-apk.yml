name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install system + Rust + Java
      run: |
        sudo apt update -y
        sudo apt install -y openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        source $HOME/.cargo/env
        rustc --version

    - name: Install full Python dependencies (fix cryptography forever)
      run: |
        python -m pip install --upgrade pip
        pip install setuptools==65.5.0 wheel
        pip install setuptools-rust
        pip install cryptography==36.0.2
        pip install Cython==0.29.36
        pip install buildozer==1.5.0

    - name: Build APK
      run: |
        buildozer android debug --verbose
      timeout-minutes: 120

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
