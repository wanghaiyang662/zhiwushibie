name: Build Android APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
      ANDROID_SDK_HOME: /home/runner/.buildozer/android/platform/android-sdk
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: 安装Ubuntu底层编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev pkg-config zip unzip wget curl
      - name: 安装Python构建工具
        run: |
          python -m pip install --upgrade pip
          pip install setuptools==65.5.0 wheel
          pip install Cython==0.29.36
          pip install buildozer==1.5.0
      - name: 缓存Buildozer构建文件
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-
      - name: 安装Android SDK命令行工具（关键修正：使用 latest 目录）
        run: |
          # 创建标准目录结构：cmdline-tools/latest/
          mkdir -p $ANDROID_SDK_HOME/cmdline-tools/latest
          
          # 下载SDK命令行工具
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          
          # 解压到临时目录
          unzip commandlinetools-linux-9477386_latest.zip -d /tmp/sdk-extract
          
          # 将内容移动到标准位置（关键！）
          mv /tmp/sdk-extract/cmdline-tools/* $ANDROID_SDK_HOME/cmdline-tools/latest/
          
          # 清理临时文件
          rm -rf /tmp/sdk-extract commandlinetools-linux-9477386_latest.zip
          
          # 添加执行权限
          chmod +x $ANDROID_SDK_HOME/cmdline-tools/latest/bin/sdkmanager
          
          # 自动接受所有许可协议（关键！）
          (for i in {1..5}; do echo y; done) | $ANDROID_SDK_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_SDK_HOME || true
          
          # 安装必要组件
          $ANDROID_SDK_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_SDK_HOME
      - name: Build APK
        run: |
          buildozer android debug --verbose
        timeout-minutes: 180
      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: bin/*.apk
