name: Build Android APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      # 关键：使用GitHub Actions预装的Android SDK
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/temurin-11-jdk-amd64
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
    steps:
      - uses: actions/checkout@v4
      - name: 设置Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: 设置Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 9477386
      - name: 安装Ubuntu依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip libncurses5 libncurses5-dev libncursesw5 lib32z1 lib32ncurses6 lib32stdc++6 curl wget build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev pkg-config libusb-1.0-0
      - name: 安装Python依赖
        run: |
          python -m pip install --upgrade pip
          pip install setuptools==65.5.0 wheel==0.42.0
          pip install Cython==0.29.36
          pip install buildozer==1.5.0
          # 安装存在的p4a版本（根据错误日志选择）
          pip install python-for-android==2023.5.21
      - name: 接受Android SDK许可
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_HOME || true
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "platform-tools" "platforms;android-31" "build-tools;31.0.0" "ndk;25.1.8937393" --sdk_root=$ANDROID_HOME
      - name: 构建APK
        run: |
          # 设置关键环境变量
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393
          
          # 验证环境
          echo "ANDROID_HOME: $ANDROID_HOME"
          echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
          echo "Java version: $(java -version 2>&1 | head -1)"
          echo "SDK Manager: $($ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --version --sdk_root=$ANDROID_HOME)"
          
          # 清理构建缓存
          rm -rf .buildozer
          
          # 详细模式构建
          buildozer --verbose android debug
        timeout-minutes: 240
      - name: 保存APK
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: bin/*.apk
      - name: 保存失败日志
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: build-logs
          path: |
            .buildozer/android/platform/python-for-android/*.log
            .buildozer/android/app/gradle.log
