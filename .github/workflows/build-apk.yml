name: Build Android APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install system dependencies
      run: |
        sudo apt update -y
        sudo apt install -y openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install setuptools==65.5.0 wheel
        pip install Cython==0.29.36
        pip install buildozer==1.5.0

    - name: FORCE FIX cryptography BY PATCHING RECIPE (终极修复)
      run: |
        mkdir -p ~/.buildozer/android/platform/python-for-android/pythonforandroid/recipes/cryptography/
        cat > ~/.buildozer/android/platform/python-for-android/pythonforandroid/recipes/cryptography/__init__.py << 'EOF'
        from pythonforandroid.recipe import PythonRecipe
        class CryptographyRecipe(PythonRecipe):
            version = '36.0.2'
            url = 'https://pypi.python.org/packages/source/c/cryptography/cryptography-36.0.2.tar.gz'
            depends = [('python3', 'python3')]
            call_hostpython_via_targetpython = False
            install_in_hostpython = True
            def build_arch(self, arch):
                pass
        EOF

    - name: Build APK
      run: |
        buildozer android debug --verbose
      timeout-minutes: 120

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: bin/*.apk
