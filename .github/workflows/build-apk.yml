name: Build Android APK

on:
  workflow_dispatch:  # 只允许手动触发，简单直接
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. 使用官方稳定版 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.8'

      # 2. 只安装最必须的系统依赖（减少报错风险）
- name: Install Deps
  run: |
    sudo apt-get update
    sudo apt-get install -y git zip unzip openjdk-17-jdk
    python -m pip install --upgrade pip
    pip install --retries 3 --timeout 120 Cython==0.29.36 buildozer==1.5.0

      # 3. 直接执行构建（关键步骤，保持简单）
      - name: Build APK
        run: |
          buildozer android debug
        continue-on-error: false

      # 4. 上传 APK（使用最新版 v4）
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: bin/*.apk
          if-no-files-found: error
