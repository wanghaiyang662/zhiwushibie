name: Build Android APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/temurin-11-jdk-amd64
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
    steps:
      - uses: actions/checkout@v4
      - name: 设置Java 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'temurin'
          cache: 'gradle'
      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip libncurses5 lib32z1 lib32stdc++6 curl wget build-essential libffi-dev libssl-dev autoconf libtool zipalign pkg-config libusb-1.0-0
      - name: 安装Python构建工具
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.36
          pip install buildozer==1.5.0
          pip install python-for-android==2023.5.21
      - name: 配置Gradle国内镜像（关键！）
        run: |
          mkdir -p ~/.gradle
          cat > ~/.gradle/init.gradle <<'EOF'
allprojects {
    buildscript {
        repositories {
            maven { url 'https://maven.aliyun.com/repository/google' }
            maven { url 'https://maven.aliyun.com/repository/public' }
            maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
            google()
            mavenCentral()
        }
    }
    repositories {
        maven { url 'https://maven.aliyun.com/repository/google' }
        maven { url 'https://maven.aliyun.com/repository/public' }
        maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
        google()
        mavenCentral()
    }
}
EOF
      - name: 安装Android组件
        run: |
          # 接受许可
          (yes || true) | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_HOME
          
          # 安装组件
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;31.0.0" \
            "ndk;25.1.8937393" \
            --sdk_root=$ANDROID_HOME
          
          # 验证NDK
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393
          echo "NDK路径: $ANDROID_NDK_HOME"
          [ -d "$ANDROID_NDK_HOME" ] && echo "✓ NDK存在" || exit 1
      - name: 构建APK
        id: build_apk
        run: |
          export ANDROID_NDK_HOME=$ANDROID_HOME/ndk/25.1.8937393
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # 清理旧构建
          rm -rf .buildozer build.log
          
          # 执行构建并保存日志
          if buildozer --verbose android debug 2>&1 | tee build.log; then
            echo "BUILD_STATUS=success" >> $GITHUB_OUTPUT
          else
            echo "BUILD_STATUS=failed" >> $GITHUB_OUTPUT
            exit 1
          fi
        timeout-minutes: 240
        continue-on-error: true
      - name: 保存APK
        uses: actions/upload-artifact@v4
        if: steps.build_apk.outputs.BUILD_STATUS == 'success'
        with:
          name: android-apk
          path: bin/*.apk
          retention-days: 30
      - name: 保存完整构建日志
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: |
            build.log
            .buildozer/**/*.log
            sdk_install.log
          retention-days: 7
          if-no-files-found: warn
