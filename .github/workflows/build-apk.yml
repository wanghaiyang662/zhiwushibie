name: Build Android APK
on: 
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    env:
      PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
      PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: 安装Ubuntu底层编译依赖
        run: |
          sudo apt update -y
          sudo apt install -y openjdk-17-jdk build-essential libffi-dev libssl-dev autoconf libtool zipalign libltdl-dev pkg-config zip unzip wget curl
      - name: 安装Python构建工具
        run: |
          python -m pip install --upgrade pip
          pip install setuptools==65.5.0 wheel
          pip install Cython==0.29.36
          pip install buildozer==1.5.0
      - name: 缓存Buildozer构建文件
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-
      - name: 安装Android SDK命令行工具（终极修正）
        run: |
          # 创建标准目录结构
          mkdir -p $ANDROID_HOME/cmdline-tools/latest
          
          # 下载并解压SDK命令行工具
          wget -O sdk.zip https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip sdk.zip -d /tmp/sdk-extract
          mv /tmp/sdk-extract/cmdline-tools/* $ANDROID_HOME/cmdline-tools/latest/
          rm -rf /tmp/sdk-extract sdk.zip
          
          # 添加执行权限
          chmod +x $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager
          
          # 自动接受许可协议
          (echo y; echo y; echo y; echo y; echo y) | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses --sdk_root=$ANDROID_HOME || true
          
          # 安装必要组件
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-31" \
            "build-tools;34.0.0" \
            --sdk_root=$ANDROID_HOME
          
          # 关键修正：创建符号链接，使Buildozer能找到sdkmanager
          mkdir -p $ANDROID_HOME/tools/bin
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager $ANDROID_HOME/tools/bin/sdkmanager
          ln -s $ANDROID_HOME/cmdline-tools/latest/bin/avdmanager $ANDROID_HOME/tools/bin/avdmanager
      - name: Build APK
        run: |
          # 显式设置环境变量
          export ANDROID_HOME=/home/runner/.buildozer/android/platform/android-sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$PATH:$ANDROID_HOME/tools/bin:$ANDROID_HOME/cmdline-tools/latest/bin
          
          # 清除可能的缓存问题
          rm -rf .buildozer/android/platform/python-for-android
          
          # 构建APK
          buildozer android debug --verbose
        timeout-minutes: 180
      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: android-apk
          path: bin/*.apk
