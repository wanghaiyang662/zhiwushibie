name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-apk:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
        
    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y python3 python3-pip python3-setuptools openjdk-8-jdk
        sudo apt install -y libffi-dev libssl-dev zlib1g-dev autoconf automake libtool git zip unzip patch
        sudo apt install -y libglib2.0-dev libnsl-dev libtirpc-dev
        sudo apt install -y build-essential libncursesw5-dev libreadline-dev libssl-dev
        sudo apt install -y libsqlite3-dev tk-dev libgdbm-dev libc6-dev libbz2-dev libexpat1-dev
        sudo apt install -y libxml2-dev libxmlsec1-dev cargo
        # 安装autoconf-archive解决LT_SYS_SYMBOL_USCORE问题
        sudo apt install -y autoconf-archive
        # 安装其他可能需要的依赖
        sudo apt install -y gettext libgettextpo-dev libgettextpo0
        sudo apt install -y pkg-config
        
    - name: Install Buildozer and dependencies
      run: |
        pip3 install --upgrade cython
        pip3 install buildozer kivy==2.1.0 pillow requests python-for-android==2023.9.16
        
    - name: Create placeholder files
      run: |
        # 创建基本的main.py文件
        echo "from kivy.app import App" > main.py
        echo "from kivy.uix.label import Label" >> main.py
        echo "from kivy.uix.boxlayout import BoxLayout" >> main.py
        echo "from kivy.uix.button import Button" >> main.py
        echo "" >> main.py
        echo "class MainApp(App):" >> main.py
        echo "    def build(self):" >> main.py
        echo "        layout = BoxLayout(orientation='vertical', padding=10, spacing=10)" >> main.py
        echo "" >> main.py
        echo "        title_label = Label(text='永红林场动植物识别学习系统', size_hint=(1, 0.2))" >> main.py
        echo "        content_label = Label(text='欢迎使用动植物识别系统', size_hint=(1, 0.6))" >> main.py
        echo "        button = Button(text='开始学习', size_hint=(1, 0.2))" >> main.py
        echo "" >> main.py
        echo "        layout.add_widget(title_label)" >> main.py
        echo "        layout.add_widget(content_label)" >> main.py
        echo "        layout.add_widget(button)" >> main.py
        echo "" >> main.py
        echo "        return layout" >> main.py
        echo "" >> main.py
        echo "MainApp().run()" >> main.py
        
        # 创建占位符图标和启动画面
        python3 -c 'from PIL import Image; icon = Image.new("RGB", (512, 512), color="red"); icon.save("icon.png"); splash = Image.new("RGB", (512, 512), color="blue"); splash.save("splash.png")'
        
    - name: Prepare buildozer.spec
      run: |
        echo "[app]" > buildozer.spec
        echo "" >> buildozer.spec
        echo "# Application versioning" >> buildozer.spec
        echo "version = 1.0" >> buildozer.spec
        echo "package.name = enhancedquiz" >> buildozer.spec
        echo "package.domain = org.example" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Source code where the main file exists" >> buildozer.spec
        echo "source.dir = ." >> buildozer.spec
        echo "source.include_exts = py,png,jpg,kv,atlas,ttf,mp3,wav,ogg,jpeg,gif,bmp" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Application requirements" >> buildozer.spec
        echo "requirements = python3,kivy==2.1.0,pillow,requests" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Buildozer environment" >> buildozer.spec
        echo "android.permissions = INTERNET,WRITE_EXTERNAL_STORAGE,READ_EXTERNAL_STORAGE" >> buildozer.spec
        echo "android.api = 30" >> buildozer.spec
        echo "android.minapi = 21" >> buildozer.spec
        echo "android.ndk_api = 21" >> buildozer.spec
        echo "android.archs = arm64-v8a" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Build settings" >> buildozer.spec
        echo "android.accept_sdk_license = True" >> buildozer.spec
        echo "android.ndk = 25b" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Orientation" >> buildozer.spec
        echo "orientation = portrait" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Title of application" >> buildozer.spec
        echo "title = 永红林场动植物识别学习系统" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Icon and splash" >> buildozer.spec
        echo "icon.filename = %(source.dir)s/icon.png" >> buildozer.spec
        echo "splash.filename = %(source.dir)s/splash.png" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "[buildozer]" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Log level" >> buildozer.spec
        echo "log_level = 2" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Build directory" >> buildozer.spec
        echo "build_dir = .buildozer" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Clean build" >> buildozer.spec
        echo "clean_build = False" >> buildozer.spec
        echo "" >> buildozer.spec
        echo "# Verbose logging for debugging" >> buildozer.spec
        echo "verbose = True" >> buildozer.spec
        
    - name: Cache Buildozer
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.local/share/python-for-android
          ~/.local/share/cython
          ~/.local/share/ffmpeg
          ~/.local/share/git-cache
        key: ${{ runner.os }}-buildozer-${{ hashFiles('**/buildozer.spec', '**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-buildozer-
          
    - name: Prepare Buildozer Environment
      run: |
        export PATH=$PATH:~/.local/bin
        # 初始化buildozer环境
        buildozer android update
        
    - name: Build APK
      timeout-minutes: 120  # 增加超时时间，因为首次构建可能需要很长时间
      run: |
        export PATH=$PATH:~/.local/bin
        # 执行构建，使用详细日志模式
        buildozer android debug --verbose
        
    - name: Find APK files
      run: |
        echo "Looking for APK files..."
        find . -name "*.apk" -type f -exec ls -la {} \; || echo "No APK files found"
        echo "Listing bin directory contents:"
        ls -la bin/ 2>/dev/null || echo "bin/ directory does not exist"
        echo "Checking build directories:"
        find .buildozer/android/platform/build*/dists/*/ -name "*.apk" -type f -exec ls -la {} \; || echo "No APK found in build dist directories"
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk-file
        path: |
          **/*.apk
          !**/*unsigned.apk
        if-no-files-found: warn
